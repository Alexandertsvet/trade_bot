<h2>Удалить аккаунт?</h2>
<p>Вы уверены, что хотите удалить аккаунт <strong>{{ object.account_id }}</strong>?</p>
<p><small>Внимание: аккаунт также будет закрыт в песочнице Тинькофф.</small></p>

<form method="post">
    {% csrf_token %}
    <button type="submit" style="background-color: red; color: white;">Да, удалить навсегда</button>
    <a href="{% url 'user:sandbox_list' %}">Отмена</a>
</form>
