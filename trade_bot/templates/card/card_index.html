<div class="card">
  <div class="card-body">
      <h3 class="card-title">Индекс {{element.0.1}}</h3>
      <p class="card-text">Текушее значение <span class="badge bg-secondary">{{element.4.1}}</span></p>
      <p class="card-text">Изменение к открытию 
        <span class="position-relative d-inline-block p-3 border badge {% if element.7.1 > 0 %}bg-success{% elif element.7.1 < 0 %}bg-danger{% else %}bg-secondary{% endif %}">{{element.7.1}}
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill {% if element.6.1 > 0 %}bg-success{% elif element.6.1 < 0 %}bg-danger{% else %}bg-secondary{% endif %}">
          {{element.6.1 }}%
          <span class="visually-hidden">unread messages</span>
        </span>
      </span></p>
      
      <button class="btn btn-secondary mb-3" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{element.0.1}}" aria-expanded="false" aria-controls="collapse{{element.0.1}}">
        Полная информация
      </button>

      <div class="collapse" id="collapse{{element.0.1}}">
        <div class="card card-body">
          <table class="table table-striped table-hover table-bordered">
          <thead class="table-dark">
            <tr>
              <th scope="col">#</th>
              <th scope="col">ИМЯ</th>
              <th scope="col">ЗНАЧЕНИЕ</th>
            </tr>
          </thead>
          <tbody>
            {% for name, role in element %}
            <tr>
              <th scope="row">{{ forloop.counter }}</th>
              <td>{{ name }}</td>
              <td>{{ role }}</td>
            </tr>
            {% empty %}
            <tr>
              <td colspan="3">Данных нет</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
          



        </div>
      </div>


  </div>
</div>
