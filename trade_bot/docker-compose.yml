services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: trade_bor
      POSTGRES_USER: trade_bor_user
      POSTGRES_PASSWORD: Tsvetkov_19
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:25.1.2.3
    container_name: clickhouse 
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=default
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch_data:/var/lib/clickhouse
    restart: unless-stopped

  web:
    build: .
    working_dir: /app
    # Автоматический сбор статики и миграции перед стартом веб-сервера
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate --noinput &&
             gunicorn --bind 0.0.0.0:8000 --timeout 120 trade_bot.wsgi"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      clickhouse:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped

  celery:
    build: .
    working_dir: /app
    command: celery -A trade_bot worker -l info
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      clickhouse:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped

volumes:
  pg_data:
  ch_data:
